[plugin]
key = "as-example-minimal"
name = "AS Example Minimal"
version = "0.1.0"
author = "Peekoo Team"
description = "Smallest possible Peekoo plugin written in AssemblyScript."
min_peekoo_version = "0.1.0"
wasm = "build/as_example_minimal.wasm"

[permissions]
required = ["state:read", "state:write"]

[[tools.definitions]]
name = "as_example_echo"
description = "Echo a string and keep a call counter in plugin state"
parameters = '{"type":"object","properties":{"input":{"type":"string"}},"required":["input"]}'
return_type = "object"
