<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Health Center</title>
    <link rel="stylesheet" href="panel.css" />
  </head>
  <body>
    <main class="panel">
      <!-- Header -->
      <header class="panel-header">
        <div>
          <p class="kicker">Wellness Control</p>
          <h1 class="title">Health Status</h1>
        </div>
        <div class="header-actions">
           <button id="btnMuteAll" class="btn-micro-action" title="DND Mode" type="button">
             <!-- Muted Icon -->
             <svg id="iconMuted" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="m11.5 15-2-2L8 14.5l3.5 3.5L19 10.5 17.5 9z"/><path d="M12 2v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="M2 12h2"/><path d="m4.9 19.1 1.4-1.4"/><path d="M12 20v2"/><path d="m17.6 17.6 1.4 1.4"/><path d="M20 12h2"/><path d="m17.6 6.4 1.4-1.4"/></svg>
             <!-- Active Icon -->
             <svg id="iconActive" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.9 4.9 1.4 1.4"/><path d="m17.7 17.7 1.4 1.4"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m4.9 19.1 1.4-1.4"/><path d="m17.7 6.4 1.4-1.4"/></svg>
           </button>
        </div>
      </header>

      <!-- Mission Cards -->
      <section class="mission-list">
        <!-- Water Card -->
        <article id="cardWater" class="mission-card" style="--slider-color: var(--color-water);">
          <div class="card-glow"></div>
          <div class="card-head">
            <div class="icon-box" style="color: var(--color-water);">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5s-3 3.5-3 5.5a7 7 0 0 0 7 7z"/></svg>
            </div>
            <div class="mission-info">
              <h3 class="mission-name">Hydration</h3>
              <p class="mission-status" id="stateWater">Active</p>
            </div>
            <div class="card-actions-top">
               <button id="resetWater" class="btn-micro-action" title="Reset Timer">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
               </button>
               <label class="switch">
                 <input id="toggleWater" type="checkbox" checked />
                 <span class="slider-toggle"></span>
               </label>
            </div>
          </div>
          
          <div class="card-main">
            <div id="timeWater" class="digital-countdown">00:00</div>
          </div>

          <div class="card-controls">
            <div class="progress-container">
              <div id="pbWater" class="progress-bar" style="background: var(--color-water);"></div>
            </div>
            <div class="config-row">
              <span class="config-label">Interval</span>
              <input id="rangeWater" type="range" min="5" max="180" step="1" />
              <span id="valWater" class="config-val">45m</span>
            </div>
          </div>
        </article>

        <!-- Eye Card -->
        <article id="cardEye" class="mission-card" style="--slider-color: var(--color-eye);">
          <div class="card-glow"></div>
          <div class="card-head">
            <div class="icon-box" style="color: var(--color-eye);">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
            <div class="mission-info">
              <h3 class="mission-name">Eye Ease</h3>
              <p class="mission-status" id="stateEye">Active</p>
            </div>
            <div class="card-actions-top">
              <button id="resetEye" class="btn-micro-action" title="Reset Timer">
                 <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              </button>
              <label class="switch">
                <input id="toggleEye" type="checkbox" checked />
                <span class="slider-toggle"></span>
              </label>
            </div>
          </div>
          
          <div class="card-main">
            <div id="timeEye" class="digital-countdown">00:00</div>
          </div>

          <div class="card-controls">
            <div class="progress-container">
              <div id="pbEye" class="progress-bar" style="background: var(--color-eye);"></div>
            </div>
            <div class="config-row">
              <span class="config-label">Interval</span>
              <input id="rangeEye" type="range" min="5" max="120" step="1" />
              <span id="valEye" class="config-val">20m</span>
            </div>
          </div>
        </article>

        <!-- StandUp Card -->
        <article id="cardStand" class="mission-card" style="--slider-color: var(--color-stand);">
          <div class="card-glow"></div>
          <div class="card-head">
            <div class="icon-box" style="color: var(--color-stand);">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="m18 2-2 4h-4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h2"/><circle cx="7" cy="5" r="3"/><path d="M5 20h4"/></svg>
            </div>
            <div class="mission-info">
              <h3 class="mission-name">Mobility</h3>
              <p class="mission-status" id="stateStand">Active</p>
            </div>
            <div class="card-actions-top">
              <button id="resetStand" class="btn-micro-action" title="Reset Timer">
                 <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              </button>
              <label class="switch">
                <input id="toggleStand" type="checkbox" checked />
                <span class="slider-toggle"></span>
              </label>
            </div>
          </div>
          
          <div class="card-main">
            <div id="timeStand" class="digital-countdown">00:00</div>
          </div>

          <div class="card-controls">
            <div class="progress-container">
              <div id="pbStand" class="progress-bar" style="background: var(--color-stand);"></div>
            </div>
            <div class="config-row">
              <span class="config-label">Interval</span>
              <input id="rangeStand" type="range" min="10" max="180" step="5" />
              <span id="valStand" class="config-val">60m</span>
            </div>
          </div>
        </article>
      </section>

      <footer class="panel-footer">
        <p>Stay active, stay hydrated</p>
      </footer>
    </main>
    <script src="panel.js"></script>
  </body>
</html>
