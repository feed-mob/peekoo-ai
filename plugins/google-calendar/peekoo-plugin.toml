[plugin]
key = "google-calendar"
name = "Google Calendar"
version = "0.1.2"
author = "Peekoo Team"
description = "Upcoming, daily, and weekly Google Calendar agenda with reminders."
min_peekoo_version = "0.1.0"
wasm = "target/wasm32-wasip1/release/google_calendar.wasm"

[permissions]
required = ["scheduler", "notifications", "state:read", "state:write", "oauth", "secrets:read", "secrets:write", "net:http"]
allowed_hosts = ["oauth2.googleapis.com", "www.googleapis.com"]

[[tools.definitions]]
name = "google_calendar_set_client_json"
description = "Store Google OAuth client credentials from client.json"
parameters = '{"type":"object","properties":{"clientJson":{"type":"string"}},"required":["clientJson"]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_connect_start"
description = "Start Google Calendar OAuth flow"
parameters = '{"type":"object","properties":{},"required":[]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_connect_status"
description = "Poll Google Calendar OAuth flow status"
parameters = '{"type":"object","properties":{"flow_id":{"type":"string"}},"required":["flow_id"]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_disconnect"
description = "Disconnect the current Google Calendar account"
parameters = '{"type":"object","properties":{},"required":[]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_refresh"
description = "Refresh Google Calendar events immediately"
parameters = '{"type":"object","properties":{},"required":[]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_get_upcoming_events"
description = "Get upcoming Google Calendar events with sync metadata"
parameters = '{"type":"object","properties":{},"required":[]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_get_daily_events"
description = "Get today's Google Calendar events with sync metadata"
parameters = '{"type":"object","properties":{},"required":[]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_get_weekly_events"
description = "Get this week's Google Calendar events with sync metadata"
parameters = '{"type":"object","properties":{},"required":[]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_create_event_for_task"
description = "Create a Google Calendar event from a task and link it"
parameters = '{"type":"object","properties":{"taskId":{"type":"string"},"title":{"type":"string"},"startAt":{"type":"string"},"endAt":{"type":"string"},"description":{"type":"string"},"location":{"type":"string"}},"required":["taskId","title","startAt","endAt"]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_link_existing_event_to_task"
description = "Link an existing Google Calendar event to a task"
parameters = '{"type":"object","properties":{"taskId":{"type":"string"},"eventId":{"type":"string"}},"required":["taskId","eventId"]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_list_task_events"
description = "List Google Calendar events linked to a task"
parameters = '{"type":"object","properties":{"taskId":{"type":"string"}},"required":["taskId"]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_unlink_task_event"
description = "Unlink a Google Calendar event from a task"
parameters = '{"type":"object","properties":{"taskId":{"type":"string"},"eventId":{"type":"string"}},"required":["taskId","eventId"]}'
return_type = "object"

[[tools.definitions]]
name = "google_calendar_update_calendar_selection"
description = "Update which Google calendars are enabled for sync"
parameters = '{"type":"object","properties":{"calendars":{"type":"array","items":{"type":"object","properties":{"id":{"type":"string"},"enabled":{"type":"boolean"}},"required":["id","enabled"]}}},"required":["calendars"]}'
return_type = "object"

[events]
subscribe = ["schedule:fired"]

[[data.providers]]
name = "panel_snapshot"
description = "Current Google Calendar panel snapshot"
schema = '{"type":"object"}'

[[ui.panels]]
label = "panel-google-calendar"
title = "Google Calendar"
width = 420
height = 560
entry = "ui/panel.html"
