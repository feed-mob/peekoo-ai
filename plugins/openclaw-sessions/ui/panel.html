<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="panels.panel-openclaw-sessions.title">OpenClaw Sessions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --space-void: oklch(0.98 0.01 60); --space-deep: oklch(0.97 0.01 55);
      --space-surface: oklch(0.94 0.02 50); --space-overlay: oklch(0.92 0.02 55);
      --text-primary: oklch(0.00 0.00 0); --text-secondary: oklch(0.42 0.02 40); --text-muted: oklch(0.58 0.02 45);
      --glow-green: oklch(0.45 0.06 155); --glow-sage: oklch(0.65 0.05 140);
      --danger: oklch(0.60 0.18 25); --success: oklch(0.65 0.05 140); --warning: oklch(0.65 0.14 45);
      --glass-border: oklch(0.45 0.06 155 / 0.12);
      --radius-panel: 1.5rem; --radius-button: 1rem; --radius-badge: 0.75rem; --radius-input: 0.625rem;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --space-void: oklch(0.25 0.03 160); --space-deep: oklch(0.28 0.02 50);
        --space-surface: oklch(0.45 0.06 155); --space-overlay: oklch(0.62 0.04 180);
        --text-primary: oklch(0.98 0.01 60); --text-secondary: oklch(0.87 0.04 70); --text-muted: oklch(0.80 0.04 60);
        --glow-green: oklch(0.70 0.04 130); --glow-sage: oklch(0.65 0.05 140);
        --danger: oklch(0.65 0.18 25); --success: oklch(0.78 0.08 180); --warning: oklch(0.72 0.12 40);
        --glass-border: oklch(0.87 0.04 70 / 0.15);
      }
    }
    body { font-family: "Inter",system-ui,-apple-system,"Segoe UI",sans-serif; background: transparent; color: var(--text-primary); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
    .app-container { display: flex; flex-direction: column; height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: var(--space-deep); border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { width: 30px; height: 30px; background: linear-gradient(135deg, var(--glow-green), var(--glow-sage)); border-radius: var(--radius-badge); display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px oklch(0.45 0.06 155 / 0.22); flex-shrink: 0; }
    .logo svg { width: 15px; height: 15px; stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .header-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 7px 14px; border: 1px solid transparent; border-radius: var(--radius-button); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s; line-height: 1; }
    .btn:hover { transform: translateY(-1px); } .btn:active { transform: translateY(0); }
    .btn-icon { width: 34px; height: 34px; padding: 0; }
    .btn-primary { background: var(--glow-green); color: white; box-shadow: 0 2px 8px oklch(0.45 0.06 155 / 0.22); }
    .btn-primary:hover { background: var(--glow-sage); } .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary { background: var(--space-deep); border-color: var(--glass-border); color: var(--text-primary); }
    .btn-secondary:hover { background: var(--space-surface); }
    .status-indicator { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .status-connected { background: oklch(0.65 0.05 140 / 0.15); color: var(--success); }
    .status-disconnected { background: oklch(0.60 0.18 25 / 0.12); color: var(--danger); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-connected .status-dot { background: var(--success); animation: pulse 2s infinite; }
    .status-disconnected .status-dot { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .content { flex: 1; overflow: hidden; position: relative; }
    .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; padding: 16px; }
    .status-message { margin-bottom: 12px; padding: 10px 14px; border-radius: var(--radius-badge); border: 1px solid var(--glass-border); background: var(--space-deep); font-size: 13px; color: var(--text-secondary); display: none; }
    .status-message.error { display: block; border-color: oklch(0.60 0.18 25 / 0.35); background: oklch(0.60 0.18 25 / 0.08); color: var(--danger); }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--glass-border); }
    .toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 8px; }
    .search-box { position: relative; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); display: flex; align-items: center; }
    .search-input { width: 260px; height: 36px; padding: 0 14px 0 34px; background: var(--space-deep); border: 1px solid var(--glass-border); border-radius: var(--radius-button); color: var(--text-primary); font-size: 13px; transition: border-color 0.15s, box-shadow 0.15s; }
    .search-input:focus { outline: none; border-color: var(--glow-green); box-shadow: 0 0 0 3px oklch(0.45 0.06 155 / 0.12); }
    .search-input::placeholder { color: var(--text-muted); }
    .table-container { background: var(--space-deep); border: 1px solid var(--glass-border); border-radius: var(--radius-panel) var(--radius-panel) 0 0; overflow: hidden; box-shadow: 0 4px 16px oklch(0.45 0.06 155 / 0.07); }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 10px 14px; text-align: left; font-size: 13px; }
    .data-table th { background: var(--space-surface); color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    .data-table tbody tr { border-top: 1px solid var(--glass-border); }
    .data-table tbody tr:hover { background: oklch(0.65 0.05 140 / 0.08); }
    .data-table td { color: var(--text-primary); }
    .cell-kind { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .cell-kind-direct { background: oklch(0.65 0.05 140 / 0.18); color: var(--success); }
    .cell-kind-proxy { background: oklch(0.65 0.14 45 / 0.18); color: var(--warning); }
    .cell-kind-unknown { background: oklch(0.58 0.02 45 / 0.15); color: var(--text-muted); }
    .cell-key { font-family: "JetBrains Mono","SF Mono",monospace; font-size: 12px; color: var(--text-secondary); }
    .cell-tokens { display: flex; flex-direction: column; gap: 3px; }
    .token-bar { width: 72px; height: 3px; background: var(--glass-border); border-radius: 2px; overflow: hidden; }
    .token-fill { height: 100%; background: var(--glow-green); border-radius: 2px; }
    .token-text { font-size: 11px; color: var(--text-muted); }
    .session-action-btn { height: 26px; padding: 0 11px; border: 1px solid var(--glass-border); border-radius: var(--radius-button); background: var(--space-deep); color: var(--text-primary); font-size: 12px; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .session-action-btn:hover { background: var(--space-surface); border-color: oklch(0.45 0.06 155 / 0.28); }
    .pagination { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border: 1px solid var(--glass-border); border-top: none; border-radius: 0 0 var(--radius-panel) var(--radius-panel); background: var(--space-surface); }
    .pagination-info { font-size: 12px; color: var(--text-secondary); }
    .pagination-actions { display: flex; align-items: center; gap: 6px; }
    .page-btn { height: 30px; padding: 0 11px; background: var(--space-deep); border: 1px solid var(--glass-border); border-radius: var(--radius-button); color: var(--text-primary); font-size: 12px; cursor: pointer; transition: background 0.15s; }
    .page-btn:hover:not(:disabled) { background: var(--space-overlay); } .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-current { padding: 0 8px; color: var(--text-muted); font-size: 12px; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: oklch(0 0 0 / 0.55); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal { background: var(--space-deep); border: 1px solid var(--glass-border); border-radius: var(--radius-panel); width: 90%; max-width: 560px; max-height: 90vh; overflow: hidden; transform: scale(0.95) translateY(12px); transition: transform 0.2s ease; box-shadow: 0 24px 48px oklch(0 0 0 / 0.18); }
    .modal-overlay.active .modal { transform: scale(1) translateY(0); }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--glass-border); }
    .modal-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    .modal-close { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--text-muted); cursor: pointer; border-radius: var(--radius-button); transition: background 0.15s, color 0.15s; }
    .modal-close:hover { background: var(--space-surface); color: var(--text-primary); }
    .modal-body { padding: 18px; overflow-y: auto; max-height: calc(90vh - 120px); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 18px; border-top: 1px solid var(--glass-border); }
    .modal-banner { margin-bottom: 14px; padding: 9px 13px; border-radius: var(--radius-badge); font-size: 13px; display: none; }
    .modal-banner.error { display: block; border: 1px solid oklch(0.60 0.18 25 / 0.35); background: oklch(0.60 0.18 25 / 0.08); color: var(--danger); }
    .modal-banner.success { display: block; border: 1px solid oklch(0.65 0.05 140 / 0.35); background: oklch(0.65 0.05 140 / 0.08); color: var(--success); }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; color: var(--text-primary); }
    .form-label .required { color: var(--glow-green); margin-left: 2px; }
    .form-input { width: 100%; padding: 9px 12px; background: var(--space-deep); border: 1px solid var(--glass-border); border-radius: var(--radius-input); color: var(--text-primary); font-size: 13px; transition: border-color 0.15s, box-shadow 0.15s; }
    .form-input:focus { outline: none; border-color: var(--glow-green); box-shadow: 0 0 0 3px oklch(0.45 0.06 155 / 0.12); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .form-divider { display: flex; align-items: center; margin: 20px 0; color: var(--text-muted); font-size: 12px; }
    .form-divider::before, .form-divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }
    .form-divider span { padding: 0 10px; }
    .chat-modal { max-width: 800px; height: min(84vh, 780px); display: flex; flex-direction: column; }
    .chat-modal .modal-body { padding: 14px; background: var(--space-void, var(--space-deep)); flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .chat-session-key { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-family: "JetBrains Mono",monospace; }
    .chat-messages { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; padding: 4px 2px 6px; }
    .chat-bubble { max-width: 72%; padding: 9px 12px; border-radius: var(--radius-panel); border: 1px solid var(--glass-border); font-size: 13px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .chat-bubble.user { align-self: flex-end; background: var(--glow-green); border-color: var(--glow-green); color: #fff; }
    .chat-bubble.assistant { align-self: flex-start; background: var(--space-deep); }
    .chat-bubble.system { align-self: center; background: oklch(0.82 0.05 50 / 0.22); }
    .chat-meta { margin-bottom: 4px; font-size: 10px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.03em; }
    .chat-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 24px; }
    .typing { display: inline-flex; align-items: center; gap: 5px; min-height: 16px; }
    .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--glow-sage); opacity: 0.35; animation: typingPulse 1s infinite ease-in-out; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; } .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingPulse { 0%,100%{transform:translateY(0);opacity:0.3}50%{transform:translateY(-3px);opacity:1} }
    .chat-input-wrap { display: flex; gap: 8px; align-items: center; padding: 6px 8px; border: 1px solid var(--glass-border); border-radius: var(--radius-panel); background: var(--space-deep); }
    .chat-input { flex: 1; height: 34px; padding: 0 10px; border: none; background: transparent; color: var(--text-primary); font-size: 13px; }
    .chat-input:focus { outline: none; }
    .chat-send-btn { height: 34px; min-width: 60px; padding: 0 14px; border-radius: var(--radius-button); border: none; background: var(--glow-green); color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .chat-send-btn:hover:not(:disabled) { background: var(--glow-sage); } .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    ::-webkit-scrollbar { width: 6px; height: 6px; } ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head><body>
  <div class="app-container">

    const tpRaw = (key, fallback = '') =>
      (typeof window.peekooPluginT === 'function'
        ? window.peekooPluginT(key, fallback || key)
        : (fallback || key));

    function tp(key, fallback = '', vars = {}) {
      let text = String(tpRaw(key, fallback));
      Object.entries(vars).forEach(([k, v]) => {
        text = text.replaceAll(`{{${k}}}`, String(v));
      });
      return text;
    }

    // ── Tauri bridge ───────────────────────────────────────────────────────────
    async function invokeTauri(cmd, args = {}) {
      if (window.__TAURI__?.core?.invoke) return window.__TAURI__.core.invoke(cmd, args);
      if (window.__TAURI__?.invoke) return window.__TAURI__.invoke(cmd, args);
      throw new Error(tp('ui.messages.tauriUnavailable', 'Tauri IPC not available'));
    }

    const PLUGIN_KEY = 'openclaw-sessions';

    async function invokePluginTool(toolName, toolArgs = {}) {
      return invokeTauri('plugin_call_panel_tool', {
        pluginKey: PLUGIN_KEY,
        toolName,
        argsJson: JSON.stringify(toolArgs),
      });
    }

    // ── JSON helpers ───────────────────────────────────────────────────────────
    function repairPossiblyBrokenJson(raw) {
      if (!raw || typeof raw !== 'string') return raw;
      let s = raw.trim();
      // close unclosed arrays/objects
      const opens = [], closes = { '{': '}', '[': ']' };
      for (const ch of s) { if (ch === '{' || ch === '[') opens.push(closes[ch]); else if (ch === '}' || ch === ']') opens.pop(); }
      s += opens.reverse().join('');
      return s;
    }

    function salvageTruncatedJson(raw) {
      if (!raw) return null;
      try { return JSON.parse(raw); } catch {}
      try { return JSON.parse(repairPossiblyBrokenJson(raw)); } catch {}
      return null;
    }

    function parsePluginJson(raw) {
      if (raw === null || raw === undefined) return null;
      if (typeof raw === 'object') return raw;
      let current = String(raw).trim().replace(/^\uFEFF/, '');
      if (!current) return null;

      // Prefer native JSON.parse and unwrap nested JSON-string shells.
      for (let i = 0; i < 6; i++) {
        try {
          const parsed = JSON.parse(current);
          if (typeof parsed === 'string') {
            current = parsed.trim();
            if (!current) return null;
            continue;
          }
          return parsed;
        } catch {}

        const salvaged = salvageTruncatedJson(current);
        if (salvaged && typeof salvaged === 'object') {
          return salvaged;
        }
        if (typeof salvaged === 'string' && salvaged.trim()) {
          current = salvaged.trim();
          continue;
        }

        // If response is a quoted+escaped JSON blob, peel one layer manually.
        if (current.length >= 2 && current[0] === '"' && current[current.length - 1] === '"') {
          current = current
            .slice(1, -1)
            .replace(/\\"/g, '"')
            .replace(/\\\\/g, '\\')
            .trim();
          continue;
        }
        break;
      }

      const loose = parseLooseJson(current);
      if (loose !== null) return loose;
      return null;
    }

    function parseLooseJson(input) {
      if (!input) return null;
      const candidates = [];
      const s = String(input).trim();
      candidates.push(s);

      if ((s.startsWith('"') && s.endsWith('"')) || (s.startsWith("'") && s.endsWith("'"))) {
        candidates.push(s.slice(1, -1));
      }

      const firstObj = s.indexOf('{');
      const lastObj = s.lastIndexOf('}');
      if (firstObj >= 0 && lastObj > firstObj) {
        candidates.push(s.slice(firstObj, lastObj + 1));
      }
      const firstArr = s.indexOf('[');
      const lastArr = s.lastIndexOf(']');
      if (firstArr >= 0 && lastArr > firstArr) {
        candidates.push(s.slice(firstArr, lastArr + 1));
      }

      for (const c of candidates) {
        const direct = salvageTruncatedJson(c);
        if (direct !== null) {
          if (typeof direct === 'string') {
            const nested = salvageTruncatedJson(direct);
            if (nested !== null) return nested;
          } else {
            return direct;
          }
        }

        const unescaped = c
          .replace(/\\\\n/g, '\n')
          .replace(/\\\\r/g, '\r')
          .replace(/\\\\t/g, '\t')
          .replace(/\\"/g, '"')
          .replace(/\\\\/g, '\\');
        const reparsed = salvageTruncatedJson(unescaped);
        if (reparsed !== null) {
          if (typeof reparsed === 'string') {
            const nested = salvageTruncatedJson(reparsed);
            if (nested !== null) return nested;
          } else {
            return reparsed;
          }
        }
      }

      return null;
    }

    function unwrapPayload(value) {
      let current = value;
      for (let i = 0; i < 4; i++) {
        if (typeof current === 'string') {
          const parsed = parsePluginJson(current);
          if (!parsed || parsed === current) break;
          current = parsed;
          continue;
        }
        if (current && typeof current === 'object' && current.payload !== undefined) {
          current = current.payload;
          continue;
        }
        break;
      }
      return current;
    }

    // ── Data helpers ───────────────────────────────────────────────────────────
    function normalizeConfig(cfg) {
      if (!cfg) return {};
      if (typeof cfg === 'string') cfg = parsePluginJson(cfg) || {};
      return cfg;
    }

    function truncate(str, n = 24) {
      if (!str) return '';
      str = String(str);
      return str.length > n ? str.slice(0, n) + '…' : str;
    }

    function toNumber(v) {
      const n = Number(v);
      return isNaN(n) ? 0 : n;
    }

    function toTimestampMs(v) {
      if (!v) return 0;
      const n = Number(v);
      if (!isNaN(n) && n > 1e12) return n;
      if (!isNaN(n) && n > 1e9) return n * 1000;
      const d = new Date(v);
      return isNaN(d.getTime()) ? 0 : d.getTime();
    }

    function parseHumanNumber(s) {
      if (s === null || s === undefined) return 0;
      if (typeof s === 'number') return s;
      s = String(s).replace(/,/g, '').trim();
      if (s.endsWith('k') || s.endsWith('K')) return parseFloat(s) * 1000;
      if (s.endsWith('m') || s.endsWith('M')) return parseFloat(s) * 1e6;
      return parseFloat(s) || 0;
    }

    function parseUsedMaxText(text) {
      if (!text) return { used: 0, max: 0 };
      const m = String(text).match(/([\d.,kmKM]+)\s*\/\s*([\d.,kmKM]+)/);
      if (m) return { used: parseHumanNumber(m[1]), max: parseHumanNumber(m[2]) };
      return { used: parseHumanNumber(text), max: 0 };
    }

    function pickFirstNumber(v) {
      if (typeof v === 'number') return v;
      if (typeof v === 'string') {
        const m = v.match(/[\d.,]+/);
        return m ? parseHumanNumber(m[0]) : 0;
      }
      return 0;
    }

    function formatCompactToken(n, decimals = 1) {
      n = toNumber(n);
      if (n >= 1e6) return (n / 1e6).toFixed(decimals) + 'M';
      if (n >= 1e3) return (n / 1e3).toFixed(decimals) + 'k';
      return String(n);
    }

    function extractTokenStats(session) {
      const t = session.token_usage || session.tokens || session.usage || {};
      const input =
        toNumber(session.inputTokens || session.input_tokens || t.input_tokens || t.input || 0);
      const output =
        toNumber(session.outputTokens || session.output_tokens || t.output_tokens || t.output || 0);
      const totalFromFields =
        toNumber(session.totalTokens || session.total_tokens || t.total_tokens || t.total || 0);
      let used = totalFromFields || (input + output);
      let max =
        toNumber(session.contextTokens || session.context_tokens || t.context_length || t.max_tokens || t.limit || 0);
      if (t.context_window) {
        const r = parseUsedMaxText(t.context_window);
        if (!used) used = r.used;
        if (!max) max = r.max;
      }
      if (!used) used = pickFirstNumber(session.total_tokens || session.tokens_used || 0);
      return { used, max, input, output, total: used };
    }

    function formatDurationMs(ms) {
      const n = Math.max(0, Math.floor(toNumber(ms)));
      if (n < 60000) return 'just now';
      if (n < 3600000) return Math.floor(n / 60000) + 'm ago';
      if (n < 86400000) return Math.floor(n / 3600000) + 'h ago';
      return Math.floor(n / 86400000) + 'd ago';
    }

    function parseDurationLikeToMs(value, defaultUnit = 'ms') {
      if (value === null || value === undefined || value === '') return 0;
      if (typeof value === 'number') {
        if (!isFinite(value) || value <= 0) return 0;
        return defaultUnit === 's' ? Math.floor(value * 1000) : Math.floor(value);
      }
      const text = String(value).trim().toLowerCase();
      if (!text) return 0;
      if (/^\d+(\.\d+)?$/.test(text)) {
        const n = parseFloat(text);
        return defaultUnit === 's' ? Math.floor(n * 1000) : Math.floor(n);
      }
      const m = text.match(/^(\d+(?:\.\d+)?)\s*(ms|msec|millisecond|milliseconds|s|sec|secs|second|seconds|m|min|mins|minute|minutes|h|hr|hrs|hour|hours|d|day|days)$/);
      if (!m) return 0;
      const n = parseFloat(m[1]);
      const unit = m[2];
      if (!isFinite(n) || n <= 0) return 0;
      if (unit === 'ms' || unit === 'msec' || unit === 'millisecond' || unit === 'milliseconds') return Math.floor(n);
      if (unit === 's' || unit === 'sec' || unit === 'secs' || unit === 'second' || unit === 'seconds') return Math.floor(n * 1000);
      if (unit === 'm' || unit === 'min' || unit === 'mins' || unit === 'minute' || unit === 'minutes') return Math.floor(n * 60000);
      if (unit === 'h' || unit === 'hr' || unit === 'hrs' || unit === 'hour' || unit === 'hours') return Math.floor(n * 3600000);
      if (unit === 'd' || unit === 'day' || unit === 'days') return Math.floor(n * 86400000);
      return 0;
    }

    function computeSessionAgeMs(raw, ts) {
      const ageMsFromMsField = parseDurationLikeToMs(raw.ageMs ?? raw.age_ms ?? raw.age_millis ?? raw.ageMilliseconds, 'ms');
      const ageMsFromSecField = parseDurationLikeToMs(raw.ageSec ?? raw.ageSecs ?? raw.ageSecond ?? raw.ageSeconds ?? raw.age_s, 's');
      const ageMsFromGeneric = parseDurationLikeToMs(raw.age, 'ms')
        || parseDurationLikeToMs(raw.age, 's');
      const fromField = ageMsFromMsField || ageMsFromSecField || ageMsFromGeneric;
      const fromTimestamp = ts > 0 ? Math.max(0, Date.now() - ts) : 0;

      if (fromField > 0 && fromTimestamp > 0) {
        // If values are wildly different, trust timestamp-derived age.
        const hi = Math.max(fromField, fromTimestamp);
        const lo = Math.max(1, Math.min(fromField, fromTimestamp));
        if (hi / lo > 4) return fromTimestamp;
      }
      return fromField || fromTimestamp;
    }

    function formatRelativeTime(tsMs) {
      if (!tsMs) return '—';
      const diff = Date.now() - tsMs;
      if (diff < 60000) return tp('ui.time.justNow', 'just now');
      if (diff < 3600000) return tp('ui.time.minutesAgo', '{{count}}m ago', { count: Math.floor(diff / 60000) });
      if (diff < 86400000) return tp('ui.time.hoursAgo', '{{count}}h ago', { count: Math.floor(diff / 3600000) });
      return tp('ui.time.daysAgo', '{{count}}d ago', { count: Math.floor(diff / 86400000) });
    }

    function normalizeSession(raw) {
      if (!raw) return null;
      const id = raw.id || raw.sessionId || raw.session_id || raw.key || '';
      const key = raw.key || raw.sessionKey || raw.session_key || raw.api_key || id;
      const kind = (raw.kind || raw.type || raw.session_type || 'unknown').toLowerCase();
      const localizedKind = tp(`ui.kind.${kind}`, kind);
      const model = raw.model || raw.model_name || raw.llm || '—';
      const ts = toTimestampMs(raw.created_at || raw.timestamp || raw.last_active || raw.updated_at || raw.updatedAt || 0);
      const ageMs = computeSessionAgeMs(raw, ts);
      const { used, max, input, output, total } = extractTokenStats(raw);
      return { id, key, kind, localizedKind, model, ts, ageMs, used, max, input, output, total, _raw: raw };
    }

    function extractMessageContent(msg) {
      if (!msg) return '';
      if (typeof msg.content === 'string') return msg.content;
      if (Array.isArray(msg.content)) {
        return msg.content.map(c => {
          if (typeof c === 'string') return c;
          if (c && c.type === 'text') return c.text || '';
          return '';
        }).join('');
      }
      return String(msg.content || '');
    }

    function extractSessions(data) {
      if (!data) return [];
      const unwrapped = unwrapPayload(data);
      if (Array.isArray(unwrapped)) return unwrapped.map(normalizeSession).filter(Boolean);
      if (unwrapped && Array.isArray(unwrapped.sessions)) {
        return unwrapped.sessions.map(normalizeSession).filter(Boolean);
      }

      if (Array.isArray(data)) return data.map(normalizeSession).filter(Boolean);
      if (Array.isArray(data.sessions)) return data.sessions.map(normalizeSession).filter(Boolean);
      if (data.payload && Array.isArray(data.payload.sessions)) {
        return data.payload.sessions.map(normalizeSession).filter(Boolean);
      }
      if (data.payload && data.payload.payload && Array.isArray(data.payload.payload.sessions)) {
        return data.payload.payload.sessions.map(normalizeSession).filter(Boolean);
      }
      if (Array.isArray(data.data)) return data.data.map(normalizeSession).filter(Boolean);
      if (Array.isArray(data.items)) return data.items.map(normalizeSession).filter(Boolean);
      return [];
    }

    function getFilteredSessions() {
      const q = state.searchQuery.toLowerCase();
      if (!q) return state.sessions;
      return state.sessions.filter(s =>
        s.key.toLowerCase().includes(q) ||
        s.model.toLowerCase().includes(q) ||
        s.kind.toLowerCase().includes(q) ||
        s.localizedKind.toLowerCase().includes(q)
      );
    }

    function getPaginatedSessions(filtered) {
      const start = (state.page - 1) * state.pageSize;
      return filtered.slice(start, start + state.pageSize);
    }

    function getTotalPages(filtered) {
      return Math.max(1, Math.ceil(filtered.length / state.pageSize));
    }

    // ── Render ─────────────────────────────────────────────────────────────────
    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function getSessionKindClass(kind) {
      if (kind === 'direct') return 'cell-kind-direct';
      if (kind === 'proxy') return 'cell-kind-proxy';
      return 'cell-kind-unknown';
    }

    function renderSessions(sessions) {
      if (!sessions.length) {
        dom.sessionsTableBody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:28px;color:var(--text-muted);">${escapeHtml(tp('ui.table.noSessionsFound', 'No sessions found'))}</td></tr>`;
        return;
      }
      dom.sessionsTableBody.innerHTML = sessions.map(s => {
        const pct = s.max > 0 ? Math.min(100, Math.round(s.used / s.max * 100)) : 0;
        const tokenLabel = s.total
          ? `${formatCompactToken(s.total)}${s.max ? ' / ' + formatCompactToken(s.max) : ''}${s.max ? ' (' + pct + '%)' : ''}`
          : '—';
        const ageLabel = s.ageMs > 0 ? formatDurationMs(s.ageMs) : formatRelativeTime(s.ts);
        return `<tr>
          <td><span class="cell-kind ${getSessionKindClass(s.kind)}">${escapeHtml(s.localizedKind)}</span></td>
          <td><span class="cell-key" title="${escapeHtml(s.key)}">${escapeHtml(truncate(s.key, 20))}</span></td>
          <td style="color:var(--text-muted);font-size:12px;">${ageLabel}</td>
          <td style="font-size:12px;">${escapeHtml(truncate(s.model, 22))}</td>
          <td><div class="cell-tokens">
            ${s.max > 0 ? `<div class="token-bar"><div class="token-fill" style="width:${pct}%"></div></div>` : ''}
            <span class="token-text">${escapeHtml(tokenLabel)}</span>
          </div></td>
          <td><button class="session-action-btn" data-id="${escapeHtml(s.id)}">${escapeHtml(tp('ui.actions.viewChat', 'View Chat'))}</button></td>
        </tr>`;
      }).join('');
    }

    function renderPagination(filtered) {
      const total = filtered.length;
      const pages = getTotalPages(filtered);
      const start = total === 0 ? 0 : (state.page - 1) * state.pageSize + 1;
      const end = Math.min(state.page * state.pageSize, total);
      dom.pageIndicator.textContent = `${state.page} / ${pages}`;
      dom.showingLabel.textContent = tp('ui.pagination.showing', 'Showing {{start}}-{{end}} of {{total}}', { start, end, total });
      dom.paginationInfo.textContent = tp('ui.pagination.pageOf', 'Page {{page}} of {{pages}}', { page: state.page, pages });
      dom.btnFirst.disabled = state.page <= 1;
      dom.btnPrev.disabled = state.page <= 1;
      dom.btnNext.disabled = state.page >= pages;
      dom.btnLast.disabled = state.page >= pages;
    }

    function renderConnectionStatus(connected) {
      dom.connectionStatus.className = `status-indicator ${connected ? 'status-connected' : 'status-disconnected'}`;
      dom.connectionStatus.innerHTML = `<span class="status-dot"></span><span>${escapeHtml(connected ? tp('ui.status.connected', 'Connected') : tp('ui.status.disconnected', 'Disconnected'))}</span>`;
    }

    function setStatusMessage(msg, isError = false) {
      dom.statusMessage.textContent = msg;
      dom.statusMessage.className = `status-message${isError ? ' error' : ''}`;
      dom.statusMessage.style.display = msg ? 'block' : 'none';
    }

    function setModalBanner(el, msg, type = 'error') {
      el.textContent = msg;
      el.className = `modal-banner${msg ? ' ' + type : ''}`;
    }

    // ── Chat render helpers ────────────────────────────────────────────────────
    function normalizeHistoryMessage(msg) {
      if (!msg) return null;
      const rawRole = (
        msg.role ||
        msg.sender ||
        msg.author ||
        msg.type ||
        msg.kind ||
        'unknown'
      ).toLowerCase();
      const role =
        rawRole === 'assistant' || rawRole === 'agent' || rawRole === 'ai' ? 'assistant'
          : rawRole === 'user' || rawRole === 'human' ? 'user'
            : rawRole === 'system' ? 'system'
              : 'assistant';
      const content =
        extractMessageContent(msg) ||
        (typeof msg.text === 'string' ? msg.text : '') ||
        (typeof msg.body === 'string' ? msg.body : '') ||
        (typeof msg.message === 'string' ? msg.message : '') ||
        (msg.message && typeof msg.message.content === 'string' ? msg.message.content : '');
      const ts = toTimestampMs(
        msg.created_at ||
        msg.createdAt ||
        msg.timestamp ||
        msg.ts ||
        msg.time ||
        0,
      );
      return { role, content, ts };
    }

    function isPluginErrorPayload(data) {
      return !!(data && typeof data === 'object' && data.success === false);
    }

    function collectMessageLikes(node, out, seen, depth = 0) {
      if (!node || depth > 8) return;
      if (Array.isArray(node)) {
        for (const item of node) collectMessageLikes(item, out, seen, depth + 1);
        return;
      }
      if (typeof node !== 'object') return;
      if (seen.has(node)) return;
      seen.add(node);

      const normalized = normalizeHistoryMessage(node);
      if (normalized && normalized.content && normalized.content.trim().length > 0) {
        out.push(normalized);
      }

      const likelyContainers = [
        'payload', 'data', 'result',
        'messages', 'history', 'items', 'events', 'entries', 'chunks', 'turns',
        'message', 'event', 'record',
      ];
      for (const key of likelyContainers) {
        if (node[key] !== undefined) {
          collectMessageLikes(node[key], out, seen, depth + 1);
        }
      }
    }

    function extractHistoryMessages(data) {
      if (!data) return [];
      const walk = (node, depth = 0) => {
        if (!node || depth > 6) return [];
        if (Array.isArray(node)) return node;
        if (typeof node === 'string') {
          const parsed = parsePluginJson(node);
          return parsed ? walk(parsed, depth + 1) : [];
        }

        if (Array.isArray(node.messages)) return node.messages;
        if (Array.isArray(node.history)) return node.history;
        if (Array.isArray(node.items)) return node.items;
        if (Array.isArray(node.events)) return node.events;
        if (Array.isArray(node.entries)) return node.entries;
        if (node.payload !== undefined) return walk(node.payload, depth + 1);
        if (node.data !== undefined) return walk(node.data, depth + 1);
        if (node.result !== undefined) return walk(node.result, depth + 1);
        return [];
      };

      const arr = walk(data);
      const primary = arr
        .map(normalizeHistoryMessage)
        .filter(m => m && typeof m.content === 'string' && m.content.trim().length > 0);
      if (primary.length > 0) return primary;

      // Fallback for unknown/changed gateway shapes.
      const fallback = [];
      collectMessageLikes(data, fallback, new WeakSet(), 0);
      return fallback.filter(m => m && typeof m.content === 'string' && m.content.trim().length > 0);
    }

    function formatWhen(tsMs) {
      if (!tsMs) return '';
      return new Date(tsMs).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function renderChatMessages(messages, isLoading = false) {
      if (Array.isArray(messages) && !isLoading) {
        state.chatMessages = messages.slice();
      }
      if (!messages.length && !isLoading) {
        dom.chatMessages.innerHTML = `<div class="chat-empty">${escapeHtml(tp('ui.chat.empty', 'No messages in this session yet.'))}</div>`;
        return;
      }
      dom.chatMessages.innerHTML = messages.map(m => {
        const roleLabel = m.role === 'user'
          ? tp('ui.chat.you', 'You')
          : m.role === 'assistant'
            ? tp('ui.chat.assistant', 'Assistant')
            : m.role;
        const when = formatWhen(m.ts);
        return `<div class="chat-bubble ${m.role}">
          <div class="chat-meta">${escapeHtml(roleLabel)}${when ? ' · ' + when : ''}</div>
          ${escapeHtml(m.content)}
        </div>`;
      }).join('');
      if (isLoading) {
        dom.chatMessages.innerHTML += `<div class="chat-bubble assistant"><div class="typing"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span><span>${escapeHtml(tp('ui.chat.typing', 'Typing...'))}</span></div></div>`;
      }
      dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight;
    }

    // ── Actions ────────────────────────────────────────────────────────────────
    function goToPage(p) {
      const filtered = getFilteredSessions();
      const pages = getTotalPages(filtered);
      state.page = Math.max(1, Math.min(p, pages));
      renderSessions(getPaginatedSessions(filtered));
      renderPagination(filtered);
    }

    function searchSessions(q) {
      state.searchQuery = q;
      state.page = 1;
      state.filtered = getFilteredSessions();
      renderSessions(getPaginatedSessions(state.filtered));
      renderPagination(state.filtered);
    }

    function openConfigModal() {
      setModalBanner(dom.configModalError, '');
      setModalBanner(dom.configModalSuccess, '');
      dom.configModal.classList.add('active');
    }

    function closeConfigModal() {
      dom.configModal.classList.remove('active');
    }

    async function saveConfig() {
      const wsUrl = dom.inputWsUrl.value.trim();
      const token = dom.inputToken.value.trim();
      const password = dom.inputPassword.value.trim();
      setModalBanner(dom.configModalError, '');
      setModalBanner(dom.configModalSuccess, '');
      if (!wsUrl) { setModalBanner(dom.configModalError, tp('ui.messages.wsRequired', 'WebSocket URL is required.')); return; }
      if (!token && !password) { setModalBanner(dom.configModalError, tp('ui.messages.tokenOrPasswordRequired', 'Provide at least a Token or Password.')); return; }
      dom.btnSaveConfig.disabled = true;
      dom.btnSaveConfig.textContent = tp('ui.actions.saving', 'Saving...');
      try {
        await invokePluginTool('save_openclaw_config', { websocketUrl: wsUrl, token, password });
        setModalBanner(dom.configModalSuccess, tp('ui.messages.configurationSaved', 'Configuration saved.'), 'success');
        setTimeout(() => { closeConfigModal(); refreshSessions(true); }, 900);
      } catch (e) {
        setModalBanner(dom.configModalError, tp('ui.messages.failedToSave', 'Failed to save: {{error}}', { error: String(e) }));
      } finally {
        dom.btnSaveConfig.disabled = false;
        dom.btnSaveConfig.textContent = tp('ui.actions.saveConfiguration', 'Save Configuration');
      }
    }

    async function loadPersistedConfig() {
      try {
        const raw = await invokePluginTool('get_openclaw_config', {});
        const cfg = normalizeConfig(parsePluginJson(raw));
        const isMissingConfig = !cfg || (!cfg.websocketUrl && !cfg.token && !cfg.password);
        if (cfg.websocketUrl) dom.inputWsUrl.value = cfg.websocketUrl;
        if (cfg.token) dom.inputToken.value = cfg.token;
        if (cfg.password) dom.inputPassword.value = cfg.password;
        if (isMissingConfig) {
          setStatusMessage(tp('ui.messages.noConfigurationFound', 'No configuration found. Please set up your connection.'), true);
          openConfigModal();
          return false;
        }
        return true;
      } catch (e) {
        console.warn('loadPersistedConfig error:', e);
        return false;
      }
    }

    function friendlyGatewayError(e) {
      const s = String(e);
      if (s.toLowerCase().includes('pairing required')) {
        return 'OpenClaw requires device pairing. Approve this device in OpenClaw first, then retry Refresh.';
      }
      if (s.includes('WASM runtime error')) {
        const ws = dom.inputWsUrl.value.trim() || 'your configured WebSocket URL';
        return `OpenClaw gateway unavailable or handshake failed (${ws}). Please confirm OpenClaw server is running and token/password is valid.`;
      }
      if (s.includes('connection refused') || s.includes('ECONNREFUSED')) return tp('ui.messages.cannotConnect', 'Cannot connect to OpenClaw server. Is it running?');
      if (s.includes('401') || s.includes('unauthorized')) return tp('ui.messages.authFailed', 'Authentication failed. Check your token or password.');
      if (s.includes('timeout')) return tp('ui.messages.connectionTimedOut', 'Connection timed out.');
      return s;
    }

    async function refreshSessions(force = false) {
      dom.btnRefresh.disabled = true;
      setStatusMessage('');
      try {
        const raw = force
          ? await invokePluginTool('refresh_sessions', {})
          : await invokePluginTool('list_sessions', { page: 1, pageSize: 100 });
        const data = parsePluginJson(raw);
        if (data && data.success === false) {
          throw new Error(data.error || 'Gateway request failed');
        }
        const unwrapped = unwrapPayload(data);
        state.sessions = extractSessions(data);
        state.connected = true;
        renderConnectionStatus(true);
        if (!state.sessions.length) {
          setStatusMessage('Connected, but no sessions returned by OpenClaw.', false);
        } else {
          setStatusMessage('');
        }
        searchSessions(state.searchQuery);
      } catch (e) {
        state.connected = false;
        state.sessions = [];
        state.filtered = [];
        state.page = 1;
        renderConnectionStatus(false);
        renderSessions([]);
        renderPagination([]);
        setStatusMessage(friendlyGatewayError(e), true);
      } finally {
        dom.btnRefresh.disabled = false;
      }
    }

    // ── Chat ───────────────────────────────────────────────────────────────────
    async function loadSessionHistory(sessionKey, sessionId = '', limit = state.chatHistoryLimit) {
      const raw = await invokePluginTool('openclaw_chat_history', { sessionKey, sessionId, limit });
      const data = parsePluginJson(raw);
      if (isPluginErrorPayload(data)) {
        throw new Error(data.error || 'chat.history failed');
      }
      return extractHistoryMessages(data);
    }

    function updateLoadMoreState(messageCount = 0) {
      const canLoadOlder = Boolean(state.chatSessionKey) && messageCount >= state.chatHistoryLimit;
      dom.btnLoadMoreChat.style.display = canLoadOlder ? 'inline-flex' : 'none';
      dom.btnLoadMoreChat.disabled = false;
      dom.btnLoadMoreChat.textContent = 'Load Older';
    }

    function stopChatLiveRefresh() {
      if (state.chatLiveTimer) { clearInterval(state.chatLiveTimer); state.chatLiveTimer = null; }
    }

    function startChatLiveRefresh() {
      stopChatLiveRefresh();
      state.chatLiveTimer = setInterval(async () => {
        if (!state.chatSessionId || !state.chatSessionKey) { stopChatLiveRefresh(); return; }
        try {
          const msgs = await loadSessionHistory(state.chatSessionKey, state.chatSessionId);
          if (msgs.length !== state.chatLastCount) {
            state.chatLastCount = msgs.length;
            renderChatMessages(msgs);
            updateLoadMoreState(msgs.length);
          }
        } catch (e) {
          console.warn('chat live refresh failed:', e);
        }
      }, 3000);
    }

    async function openSessionChat(sessionId) {
      const session = state.sessions.find(s => s.id === sessionId);
      state.chatSessionId = sessionId;
      state.chatSessionKey = session ? session.key : sessionId;
      state.chatLastCount = 0;
      state.chatHistoryLimit = 200;
      dom.chatSessionKey.textContent = session ? truncate(session.key, 40) : sessionId;
      dom.chatMessages.innerHTML = `<div class="chat-empty">${escapeHtml(tp('ui.chat.loading', 'Loading...'))}</div>`;
      dom.chatModal.classList.add('active');
      updateLoadMoreState(0);
      try {
        const msgs = await loadSessionHistory(state.chatSessionKey, state.chatSessionId);
        if (msgs.length > 0) {
          state.chatLastCount = msgs.length;
          renderChatMessages(msgs);
          updateLoadMoreState(msgs.length);
        } else {
          state.chatLastCount = 0;
          renderChatMessages(state.chatMessages || []);
          updateLoadMoreState(0);
        }
      } catch (e) {
        renderChatMessages([{ role: 'system', content: 'Load history failed: ' + String(e), ts: Date.now() }]);
        updateLoadMoreState(0);
      }
      startChatLiveRefresh();
    }

    function closeChatModal() {
      stopChatLiveRefresh();
      state.chatSessionId = null;
      state.chatSessionKey = null;
      state.chatHistoryLimit = 200;
      state.chatMessages = [];
      dom.chatModal.classList.remove('active');
      dom.chatInput.value = '';
      updateLoadMoreState(0);
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function sendChatMessage() {
      const text = dom.chatInput.value.trim();
      if (!text || !state.chatSessionId || !state.chatSessionKey) return;
      dom.chatInput.value = '';
      dom.btnSendChat.disabled = true;
      let baseline = state.chatMessages.length ? state.chatMessages.slice() : [];
      if (!baseline.length) {
        try {
          baseline = await loadSessionHistory(state.chatSessionKey, state.chatSessionId);
        } catch {
          baseline = [];
        }
      }
      const optimistic = baseline.slice();
      optimistic.push({ role: 'user', content: text, ts: Date.now() });
      state.chatMessages = optimistic.slice();
      renderChatMessages(optimistic, true);
      try {
        const sendRaw = await invokePluginTool('openclaw_chat_send', {
          sessionKey: state.chatSessionKey,
          sessionId: state.chatSessionId,
          message: text,
        });
        const sendData = parsePluginJson(sendRaw);
        if (isPluginErrorPayload(sendData)) {
          throw new Error(sendData.error || 'chat.send failed');
        }

        let rendered = false;
        for (let i = 0; i < 8; i++) {
          await sleep(500);
          try {
            const updated = await loadSessionHistory(state.chatSessionKey, state.chatSessionId);
            if (updated.length >= optimistic.length) {
              state.chatLastCount = updated.length;
              renderChatMessages(updated);
              updateLoadMoreState(updated.length);
              rendered = true;
              break;
            }
          } catch {
            // keep retrying within polling window
          }
        }
        if (!rendered) {
          // Gateway may be eventually consistent right after send; keep optimistic view.
          state.chatLastCount = optimistic.length;
          renderChatMessages(optimistic);
          updateLoadMoreState(optimistic.length);
        }
      } catch (e) {
        optimistic.push({ role: 'system', content: tp('ui.messages.errorPrefix', 'Error: {{error}}', { error: String(e) }), ts: Date.now() });
        state.chatLastCount = optimistic.length;
        renderChatMessages(optimistic);
        updateLoadMoreState(optimistic.length);
      } finally {
        dom.btnSendChat.disabled = false;
        dom.chatInput.focus();
      }
    }

    // ── Event listeners ────────────────────────────────────────────────────────
    function initEventListeners() {
      dom.btnRefresh.addEventListener('click', () => refreshSessions(true));
      dom.btnSettings.addEventListener('click', openConfigModal);
      dom.searchInput.addEventListener('input', e => searchSessions(e.target.value));
      dom.btnFirst.addEventListener('click', () => goToPage(1));
      dom.btnPrev.addEventListener('click', () => goToPage(state.page - 1));
      dom.btnNext.addEventListener('click', () => goToPage(state.page + 1));
      dom.btnLast.addEventListener('click', () => goToPage(getTotalPages(getFilteredSessions())));
      dom.sessionsTableBody.addEventListener('click', e => {
        const btn = e.target.closest('.session-action-btn');
        if (btn) openSessionChat(btn.dataset.id);
      });
      dom.btnSaveConfig.addEventListener('click', saveConfig);
      dom.btnCancelConfig.addEventListener('click', closeConfigModal);
      dom.btnCloseModal.addEventListener('click', closeConfigModal);
      dom.configModal.addEventListener('click', e => { if (e.target === dom.configModal) closeConfigModal(); });
      dom.btnCloseChatModal.addEventListener('click', closeChatModal);
      dom.chatModal.addEventListener('click', e => { if (e.target === dom.chatModal) closeChatModal(); });
      dom.btnSendChat.addEventListener('click', sendChatMessage);
      dom.btnLoadMoreChat.addEventListener('click', async () => {
        if (!state.chatSessionKey) return;
        const previousCount = state.chatMessages.length;
        state.chatHistoryLimit += 200;
        dom.btnLoadMoreChat.disabled = true;
        dom.btnLoadMoreChat.textContent = 'Loading…';
        try {
          const msgs = await loadSessionHistory(state.chatSessionKey, state.chatSessionId, state.chatHistoryLimit);
          state.chatLastCount = msgs.length;
          renderChatMessages(msgs);
          updateLoadMoreState(msgs.length);
          if (msgs.length <= previousCount) {
            setStatusMessage('No older messages available for this session.', false);
          } else {
            setStatusMessage('');
          }
        } catch (e) {
          state.chatHistoryLimit = Math.max(200, state.chatHistoryLimit - 200);
          updateLoadMoreState(state.chatMessages.length);
          setStatusMessage('Load older history failed: ' + String(e), true);
        }
      });
      dom.chatInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); } });
      dom.configForm.addEventListener('submit', e => { e.preventDefault(); saveConfig(); });
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    async function init() {
      initEventListeners();
      renderConnectionStatus(false);
      renderSessions([]);
      renderPagination([]);
      if (!state.ageTicker) {
        state.ageTicker = setInterval(() => {
          renderSessions(getPaginatedSessions(getFilteredSessions()));
        }, 30000);
      }
      const hasConfig = await loadPersistedConfig();
      if (hasConfig) {
        await refreshSessions(true);
      }
    }

    let hasBootstrapped = false;

    async function bootstrap() {
      if (hasBootstrapped) return;
      hasBootstrapped = true;
      try {
        await init();
      } catch (e) {
        console.error('OpenClaw panel init failed:', e);
        setStatusMessage(`Panel initialization failed: ${String(e)}`, true);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => { void bootstrap(); }, { once: true });
    } else {
      void bootstrap();
    }
  </script>
</body>
</html>
