[plugin]
key = "example-minimal"
name = "Example Minimal"
version = "0.1.0"
author = "Peekoo Team"
description = "Smallest possible Peekoo plugin with one tool export."
min_peekoo_version = "0.1.0"
wasm = "target/wasm32-unknown-unknown/release/example_minimal.wasm"

[permissions]
required = ["state:read", "state:write"]

[[tools.definitions]]
name = "example_echo"
description = "Echo a string and keep a call counter in plugin state"
parameters = '{"type":"object","properties":{"input":{"type":"string"}},"required":["input"]}'
return_type = "object"
