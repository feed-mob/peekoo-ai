[package]
name = "peekoo-desktop-tauri"
version = "0.1.0"
description = "Peekoo AI Desktop Pet - Tauri Version"
edition = "2024"
rust-version = "1.85"

[lib]
name = "peekoo_desktop_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

peekoo-core-domain = { path = "../../../crates/core-domain" }
peekoo-core-app = { path = "../../../crates/core-app" }
peekoo-persistence-sqlite = { path = "../../../crates/persistence-sqlite" }
peekoo-security = { path = "../../../crates/security" }
peekoo-event-bus = { path = "../../../crates/event-bus" }
peekoo-plugin-host = { path = "../../../crates/plugin-host" }
peekoo-agent = { path = "../../../crates/peekoo-agent" }
asupersync = "0.2"
rusqlite = { version = "0.38" }
dirs = "6"
uuid = { version = "1", features = ["v4"] }
base64 = "0.22"
sha2 = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
