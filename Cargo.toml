[workspace]
members = [
  "crates/peekoo-productivity-domain",
  "crates/persistence-sqlite",
  "crates/security",
  "crates/peekoo-agent",
  "crates/peekoo-agent-auth",
  "crates/peekoo-agent-app",
  "crates/peekoo-paths",
  "crates/peekoo-scheduler",
  "crates/peekoo-notifications",
  "crates/peekoo-plugin-host",
  "crates/peekoo-plugin-store",
  "apps/desktop-tauri/src-tauri",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
version = "0.1.0"

[profile.release]
lto = true
codegen-units = 1
opt-level = "s"
strip = true
