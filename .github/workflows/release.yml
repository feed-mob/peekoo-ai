name: Release

on:
  workflow_run:
    workflows: ["Auto Tag"]
    types: [completed]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_aur:
        description: "Publish to AUR (requires a published release for the latest tag)"
        type: boolean
        default: false
      finalize_release_tag:
        description: "Optional tag to publish from draft and mark as latest (example: v0.1.2)"
        type: string
        required: false

permissions:
  contents: write

jobs:
  prepare-release:
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master') ||
      (github.event_name == 'workflow_dispatch' && !inputs.publish_aur && !inputs.finalize_release_tag)
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      tag_version: ${{ steps.resolve.outputs.tag_version }}
      target_sha: ${{ steps.resolve.outputs.target_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve release tag
        id: resolve
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          TAG_NAME="v${VERSION}"

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TARGET_SHA="${{ github.event.workflow_run.head_sha }}"
            git fetch --force --tags origin
            TAG_SHA=$(git rev-list -n 1 "$TAG_NAME" 2>/dev/null || true)

            if [ -z "$TAG_SHA" ]; then
              echo "Expected tag $TAG_NAME does not exist" >&2
              exit 1
            fi

            if [ "$TAG_SHA" != "$TARGET_SHA" ]; then
              echo "Tag $TAG_NAME points to $TAG_SHA, expected $TARGET_SHA" >&2
              exit 1
            fi
          else
            TARGET_SHA=$(git rev-parse HEAD)
          fi

          {
            echo "tag_name=$TAG_NAME"
            echo "tag_version=$VERSION"
            echo "target_sha=$TARGET_SHA"
          } >> "$GITHUB_OUTPUT"

  release-notes:
    needs: prepare-release
    if: needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.notes.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: Generate release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            --method POST \
            --field tag_name="${{ needs.prepare-release.outputs.tag_name }}" \
            --field target_commitish="${{ needs.prepare-release.outputs.target_sha }}" \
            --jq .body > release-notes.md
          printf '\n---\n\n> macOS users: The macOS DMG is not yet notarized with Apple. After installing, open Terminal and run `xattr -cr /Applications/Peekoo.app` to allow the app to open. See the [macOS install guide](https://github.com/feed-mob/peekoo-ai/blob/master/docs/install-macos.md) for details.\n' >> release-notes.md
          {
            echo 'release_body<<EOF'
            cat release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: [prepare-release, release-notes]
    if: needs.prepare-release.result == 'success' && needs.release-notes.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg,updater
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: --bundles appimage,deb
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --bundles nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.target_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: apps/desktop-ui
        run: bun install --frozen-lockfile

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            libfuse2 \
            fuse

      - name: Seed local Tauri AppImage tools
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p target/.tauri
          wget -q -O target/.tauri/AppRun-x86_64 \
            https://github.com/tauri-apps/binary-releases/releases/download/apprun-old/AppRun-x86_64
          wget -q -O target/.tauri/linuxdeploy-x86_64.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O target/.tauri/linuxdeploy-plugin-gtk.sh \
            https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          wget -q -O target/.tauri/linuxdeploy-plugin-gstreamer.sh \
            https://raw.githubusercontent.com/tauri-apps/linuxdeploy-plugin-gstreamer/master/linuxdeploy-plugin-gstreamer.sh
          wget -q -O target/.tauri/linuxdeploy-plugin-appimage.AppImage \
            https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x \
            target/.tauri/AppRun-x86_64 \
            target/.tauri/linuxdeploy-x86_64.AppImage \
            target/.tauri/linuxdeploy-plugin-gtk.sh \
            target/.tauri/linuxdeploy-plugin-gstreamer.sh \
            target/.tauri/linuxdeploy-plugin-appimage.AppImage
          file target/.tauri/AppRun-x86_64 target/.tauri/linuxdeploy-x86_64.AppImage target/.tauri/linuxdeploy-plugin-appimage.AppImage

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js for OpenCode bundling
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stage bundled OpenCode
        shell: bash
        run: |
          python scripts/fetch_opencode_bundle.py \
            --target "${{ matrix.rust_target }}" \
            --output apps/desktop-tauri/src-tauri/resources/opencode

      - name: Build ACP sidecar
        run: cargo build --release --locked -p peekoo-agent-acp --target ${{ matrix.rust_target }}

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
        with:
          projectPath: apps/desktop-tauri
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: Peekoo ${{ needs.prepare-release.outputs.tag_name }}
          releaseBody: ${{ needs.release-notes.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  finalize-release:
    if: github.event_name == 'workflow_dispatch' && inputs.finalize_release_tag
    runs-on: ubuntu-latest
    steps:
      - name: Publish release and mark latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ inputs.finalize_release_tag }}" --draft=false --latest

  publish-aur:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_aur)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # Get the latest release tag
            TAG=$(gh release view --json tagName --jq .tagName)
            echo "pkgver=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute AppImage SHA256 and patch PKGBUILD
        working-directory: scripts/aur
        run: |
          VERSION=${{ steps.version.outputs.pkgver }}
          URL="https://github.com/feed-mob/peekoo-ai/releases/download/v${VERSION}/Peekoo_${VERSION}_amd64.AppImage"
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          sed -i "s/pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/'REPLACE_WITH_APPIMAGE_SHA256'/'${SHA256}'/" PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: peekoo-bin
          pkgbuild: scripts/aur/PKGBUILD
          assets: |
            scripts/aur/peekoo.desktop
            scripts/aur/peekoo.png
          updpkgsums: false
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.pkgver }}"
