name: Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_aur:
        description: "Publish to AUR (requires a published release for the latest tag)"
        type: boolean
        default: false
      finalize_release_tag:
        description: "Optional tag to publish from draft and mark as latest (example: v0.1.2)"
        type: string
        required: false

permissions:
  contents: write

jobs:
  release-notes:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.publish_aur && !inputs.finalize_release_tag)
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.notes.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            --method POST \
            --field tag_name="${GITHUB_REF_NAME}" \
            --field target_commitish="${GITHUB_SHA}" \
            --jq .body > release-notes.md
          printf '\n---\n\n> macOS users: The macOS DMG is not yet notarized with Apple. After installing, open Terminal and run `xattr -cr /Applications/Peekoo.app` to allow the app to open. See the [macOS install guide](https://github.com/feed-mob/peekoo-ai/blob/master/docs/install-macos.md) for details.\n' >> release-notes.md
          {
            echo 'release_body<<EOF'
            cat release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: release-notes
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.publish_aur && !inputs.finalize_release_tag)
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin --bundles dmg,updater
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
          - platform: windows-latest
            args: --bundles nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable long paths (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          git config --system core.longpaths true
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\FileSystem" /v LongPathsEnabled /t REG_DWORD /d 1 /f
        shell: pwsh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: apps/desktop-ui
        run: bun install --frozen-lockfile

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_CONFIG: ${{ matrix.platform == 'macos-14' && '{"app":{"macOSPrivateApi":true}}' || '{"app":{"macOSPrivateApi":false}}' }}
        with:
          projectPath: apps/desktop-tauri
          tagName: v__VERSION__
          releaseName: Peekoo v__VERSION__
          releaseBody: ${{ needs.release-notes.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  finalize-release:
    if: github.event_name == 'workflow_dispatch' && inputs.finalize_release_tag
    runs-on: ubuntu-latest
    steps:
      - name: Publish release and mark latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ inputs.finalize_release_tag }}" --draft=false --latest

  publish-aur:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_aur)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "pkgver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            # Get the latest release tag
            TAG=$(gh release view --json tagName --jq .tagName)
            echo "pkgver=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute AppImage SHA256 and patch PKGBUILD
        working-directory: packaging/aur
        run: |
          VERSION=${{ steps.version.outputs.pkgver }}
          URL="https://github.com/feed-mob/peekoo-ai/releases/download/v${VERSION}/Peekoo_${VERSION}_amd64.AppImage"
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          sed -i "s/pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/'REPLACE_WITH_APPIMAGE_SHA256'/'${SHA256}'/" PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: peekoo-bin
          pkgbuild: packaging/aur/PKGBUILD
          assets: |
            packaging/aur/peekoo.desktop
            packaging/aur/peekoo.png
          updpkgsums: false
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.version.outputs.pkgver }}"
