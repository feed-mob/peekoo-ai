name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.notes.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            --method POST \
            --field tag_name="${GITHUB_REF_NAME}" \
            --field target_commitish="${GITHUB_SHA}" \
            --jq .body > release-notes.md
          {
            echo 'release_body<<EOF'
            cat release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

  publish-tauri:
    needs: release-notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin --bundles dmg
          - platform: ubuntu-22.04
            args: --bundles appimage,deb
          - platform: windows-latest
            args: --bundles nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: apps/desktop-ui
        run: bun install --frozen-lockfile

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: Peekoo v__VERSION__
          releaseBody: ${{ needs.release-notes.outputs.release_body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
