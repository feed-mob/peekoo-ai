name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            cargo clippy --workspace --all-targets --all-features -- -D warnings
          else
            cargo clippy --workspace --all-targets --all-features --exclude peekoo-desktop-tauri -- -D warnings
          fi

      - name: Test workspace
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            cargo test --workspace
          else
            cargo test --workspace --exclude peekoo-desktop-tauri
          fi

      - name: Test release tooling
        run: python -m unittest scripts.tests.test_release

  desktop-ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI
        run: bun run build
